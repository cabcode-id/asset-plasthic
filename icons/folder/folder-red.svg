<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="body-grad-r" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#E8341A"/>
      <stop offset="100%" stop-color="#9B1A09"/>
    </linearGradient>
    <linearGradient id="tab-grad-r" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FF6B52"/>
      <stop offset="100%" stop-color="#C42D14"/>
    </linearGradient>
    <linearGradient id="shine-r" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow-r" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#5a0a00" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Folder tab -->
  <path d="M4 18 Q4 14 8 14 L24 14 Q27 14 28.5 17 L30 20 L8 20 Q4 20 4 18 Z"
        fill="url(#tab-grad-r)" filter="url(#shadow-r)"/>

  <!-- Folder body -->
  <rect x="4" y="20" width="56" height="34" rx="3" ry="3"
        fill="url(#body-grad-r)" filter="url(#shadow-r)"/>

  <!-- Shine overlay -->
  <rect x="4" y="20" width="56" height="17" rx="3" ry="3"
        fill="url(#shine-r)"/>

  <!-- Bottom edge highlight -->
  <rect x="4" y="51" width="56" height="3" rx="2" ry="2"
        fill="#5a0a00" opacity="0.25"/>
</svg>
