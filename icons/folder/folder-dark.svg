<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="body-grad-d" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#6B3A1F"/>
      <stop offset="100%" stop-color="#3A1A08"/>
    </linearGradient>
    <linearGradient id="tab-grad-d" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#8C4D28"/>
      <stop offset="100%" stop-color="#5A2A10"/>
    </linearGradient>
    <linearGradient id="shine-d" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent-d" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#E8921F" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#E8921F" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E8921F" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow-d" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1a0800" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Folder tab -->
  <path d="M4 18 Q4 14 8 14 L24 14 Q27 14 28.5 17 L30 20 L8 20 Q4 20 4 18 Z"
        fill="url(#tab-grad-d)" filter="url(#shadow-d)"/>

  <!-- Folder body -->
  <rect x="4" y="20" width="56" height="34" rx="3" ry="3"
        fill="url(#body-grad-d)" filter="url(#shadow-d)"/>

  <!-- Shine overlay -->
  <rect x="4" y="20" width="56" height="17" rx="3" ry="3"
        fill="url(#shine-d)"/>

  <!-- Bottom edge highlight -->
  <rect x="4" y="51" width="56" height="3" rx="2" ry="2"
        fill="#1a0800" opacity="0.3"/>
</svg>
