<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="body-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#C8791A"/>
    </linearGradient>
    <linearGradient id="tab-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FBCA6A"/>
      <stop offset="100%" stop-color="#E8921F"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#7a4200" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Folder tab -->
  <path d="M4 18 Q4 14 8 14 L24 14 Q27 14 28.5 17 L30 20 L60 20 Q60 20 60 20 L60 20 L8 20 Q4 20 4 18 Z"
        fill="url(#tab-grad)" filter="url(#shadow)"/>

  <!-- Folder body -->
  <rect x="4" y="20" width="56" height="34" rx="3" ry="3"
        fill="url(#body-grad)" filter="url(#shadow)"/>

  <!-- Shine overlay -->
  <rect x="4" y="20" width="56" height="17" rx="3" ry="3"
        fill="url(#shine)"/>

  <!-- Bottom edge highlight -->
  <rect x="4" y="51" width="56" height="3" rx="2" ry="2"
        fill="#7a4200" opacity="0.25"/>
</svg>
